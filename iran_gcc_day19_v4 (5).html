@media(prefers-color-scheme:dark){

    --bg:#1e1e1c;--bg2:#272724;--bg3:#2f2f2c;
    --txt:#d4d2c8;--txt2:#8a887f;--txt3:#5a5855;
    --brd:#3a3835;--brd2:#4a4845;--brd3:#333330;
    --red-bg:#3d1a1a;--amber-bg:#3d2c0a;--green-bg:#1a2d0a;--blue-bg:#0d1e35;

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;padding:20px;max-width:900px;margin:0 auto;}
h1{font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:2px;}
.meta{font-size:12px;color:var(--txt2);margin-bottom:18px;}
/* trend */
.trend{background:var(--bg2);border:0.5px solid var(--brd3);border-radius:var(--rad);padding:11px 14px;margin-bottom:14px;}
.trend-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.trend-arr{font-size:15px;font-weight:700;}
.trend-lbl{font-size:12px;font-weight:600;}
.trend-txt{font-size:11.5px;line-height:1.55;color:var(--txt);}
.sig-det{color:var(--red);}.det{color:#854F0B;}
/* grid — single column on left */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.card{background:var(--bg);border:0.5px solid var(--brd3);border-radius:var(--rad);padding:11px 12px;cursor:pointer;user-select:none;transition:border-color .15s,box-shadow .15s;}

.card.active{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,.12);}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.card-lbl{font-size:9.5px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-red{background:var(--red);}.dot-amber{background:var(--amber);}
.card-hl{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:3px;}
.card-sup{font-size:10.5px;color:var(--txt2);line-height:1.35;margin-bottom:7px;}
.card-bot{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.pill-neg3,.pill-neg2{background:var(--red-bg);color:var(--red);}
.pill-neg1{background:var(--amber-bg);color:#854F0B;}
.pill-zero{background:var(--bg3);color:var(--txt2);}
.pill-pos1{background:var(--green-bg);color:var(--green);}
.delta{font-size:10.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.delta-worse{color:var(--red);}.delta-same{color:var(--txt3);}.delta-better{color:var(--green);}
.sbar{height:2.5px;background:var(--brd3);border-radius:2px;overflow:hidden;margin-top:5px;}
.sbar-fill{height:100%;border-radius:2px;}
.sbar-red{background:var(--red);}.sbar-amber{background:var(--amber);}
.hint{font-size:9.5px;color:var(--txt3);text-align:center;margin-top:3px;}
/* panel — lives in right col */
.panel{background:var(--bg2);border:0.5px solid var(--brd3);border-radius:var(--rad);padding:14px 16px;margin-bottom:12px;display:none;}
.panel.open{display:block;}
.panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid var(--brd3);}
.panel-title{font-size:15px;font-weight:700;}
.close-btn{font-size:20px;cursor:pointer;color:var(--txt2);line-height:1;}
/* footer in left col */
.footer{font-size:10px;color:var(--txt3);padding:10px 16px;border-top:0.5px solid var(--brd3);line-height:1.5;flex-shrink:0;}
/* section label */
.sec{font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px;margin:14px 0 8px;}
.sec:first-child{margin-top:0;}
.sec-line{height:0.5px;flex:1;background:var(--brd3);}

.da-box{background:var(--bg);border:0.5px solid var(--brd3);border-radius:var(--rad);padding:12px 14px;margin-bottom:12px;}
.da-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:7px;border-bottom:0.5px solid var(--brd3);margin-bottom:7px;}
.da-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);}
.da-ts{font-size:10px;color:var(--txt3);font-style:italic;}
.da-list{list-style:none;}
.da-list li{display:flex;align-items:flex-start;gap:9px;padding:5px 0;border-bottom:0.5px solid var(--brd3);font-size:12px;line-height:1.55;}
.da-list li:last-child{border-bottom:none;}
.badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.b-new{background:var(--red-bg);color:var(--red);}
.b-ongoing{background:var(--amber-bg);color:#854F0B;}
.b-watch{background:var(--blue-bg);color:#2952A3;}
.b-resolved{background:var(--green-bg);color:var(--green);}
.b-critical{background:var(--red);color:#fff;}
.b-developing{background:#F5F0FF;color:#5B21B6;}
.b-verified{background:var(--bg3);color:var(--txt2);}

.ki-list{list-style:none;}

.ki-list li:last-child{border-bottom:none;}
.ki-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px;}
.kd-r{background:var(--red);}.kd-a{background:var(--amber);}.kd-b{background:var(--blue);}.kd-g{background:var(--green);}

.rc{font-size:12px;font-weight:600;}
.rt{font-size:10px;color:var(--txt2);}

.log-meta{font-size:11px;color:var(--txt3);}

.log-body{display:none;margin-top:5px;border:0.5px solid var(--brd3);border-radius:var(--rad-sm);overflow:hidden;overflow-x:auto;}

.lrr{display:grid;grid-template-columns:94px 44px 148px 96px 1fr;border-bottom:0.5px solid var(--brd3);min-width:540px;}
.lri:last-child,.lrr:last-child{border-bottom:none;}
.lri.cr{background:#fcebeb22;}
.lc{font-size:10.5px;color:var(--txt);padding:5px 7px;line-height:1.4;}
.cpill{font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:6px;background:var(--red-bg);color:var(--red);border:0.5px solid #E24B4A44;white-space:nowrap;display:inline-block;}
.npill{font-size:9.5px;padding:1px 6px;border-radius:6px;background:var(--bg2);color:var(--txt3);border:0.5px solid var(--brd3);white-space:nowrap;display:inline-block;}

.ti{display:inline-flex;align-items:center;gap:4px;font-size:10px;}
.tsq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.tsq-fin{background:#0C447C;}.tsq-inf{background:#378ADD;}
.tsq-mil{background:#5DCAA5;}.tsq-unk{background:#B4B2A9;}
.tsq-dir{background:transparent;border:2px solid var(--red);}

.crit-alert{background:var(--red-bg);border:0.5px solid #E24B4A44;border-radius:var(--rad-sm);padding:8px 12px;margin-bottom:12px;font-size:11.5px;color:var(--red);font-weight:600;line-height:1.5;}

#itt{position:fixed;pointer-events:none;z-index:9999;display:none;background:var(--bg);border:0.5px solid var(--brd2);border-radius:var(--rad);padding:10px 12px;min-width:240px;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.ttd{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;padding-bottom:4px;border-bottom:0.5px solid var(--brd3);}
.tte{display:flex;align-items:flex-start;gap:6px;padding:3px 0;border-bottom:0.5px solid var(--brd3);}
.tte:last-child{border-bottom:none;}
.ttf{font-size:11px;font-weight:500;line-height:1.35;}
.ttc{font-size:10px;color:var(--txt2);margin-top:1px;}
/* footer */
.footer{font-size:11px;color:var(--txt3);margin-top:14px;padding-top:10px;border-top:0.5px solid var(--brd3);line-height:1.5;}

function bcdI(code){
  const w=new Array(20).fill(0),e=new Array(20).fill(0),l=new Array(20).fill(0),cr=new Set();
  II.filter(i=>i.co===code).forEach(i=>{
    if(i.cat==='water')w[i.di]++;else if(i.cat==='electricity')e[i.di]++;else l[i.di]++;
    if(i.crit)cr.add(i.di);
  });
  return{w,e,l,cr:[...cr]};
}
function bcdR(code){
  const fin=new Array(20).fill(0),inf=new Array(20).fill(0),mil=new Array(20).fill(0),unk=new Array(20).fill(0),dr=new Set();
  RI.filter(i=>i.country===code).forEach(i=>{
    if(i.type==='fin')fin[i.di]++;else if(i.type==='infra')inf[i.di]++;else if(i.type==='mil')mil[i.di]++;else unk[i.di]++;
    if(i.direct)dr.add(i.di);
  });
  return{fin,inf,mil,unk,dr:[...dr]};
}
const critPlugin={id:'cp',afterDatasetsDraw(chart,_,o){
  if(!o?.d?.length)return;
  const{ctx,scales:{x},chartArea}=chart;
  const bw=(x.width/DS19.length)*0.75;
  o.d.forEach(di=>{
    const px=x.getPixelForValue(di);
    ctx.save();ctx.strokeStyle='#E24B4A';ctx.lineWidth=1.8;
    ctx.strokeRect(px-bw/2,chartArea.top,bw,chartArea.bottom-chartArea.top);
    ctx.restore();
  });
}};
Chart.register(critPlugin);

function tAP(code){
  if(HA.has(code))HA.delete(code);else HA.add(code);
  if(CR.fl){const ds=CR.fl.data.datasets.find(d=>d.label===code);if(ds){ds.hidden=HA.has(code);CR.fl.update();}}
  const l=document.getElementById('fla-'+code);if(l)l.classList.toggle('dim',HA.has(code));
}

// Custom plugin: draw totals above stacked bars directly on canvas (bypasses clip)
const totalLabelPlugin={
  id:'totalLabel',
  afterDraw(chart){
    const{ctx,data,scales:{x,y},chartArea}=chart;
    if(!chart.config.options.plugins?.totalLabel?.show)return;
    const totals=chart.config.options.plugins.totalLabel.data;
    const color=chart.config.options.plugins.totalLabel.color||'#333';
    ctx.save();
    ctx.font='bold 9px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle=color;
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    totals.forEach((val,i)=>{
      if(!val)return;
      const px=x.getPixelForValue(i);
      const py=y.getPixelForValue(val)-3;
      ctx.fillText(String(val),px,py);
    });
    ctx.restore();
  }
};
Chart.register(totalLabelPlugin);

// Custom plugin: draw totals above infra small-multiple bars

};

// ══ TOGGLE PANEL ═════════════════════════════════════════════════
function tog(id){
  const panel=document.getElementById('panel');
  const card=document.getElementById('card-'+id);
  if(activeCard===id){
    panel.innerHTML='';panel.classList.remove('open');
    card.classList.remove('active');activeCard=null;
    Object.values(CR).forEach(ch=>{try{ch.destroy();}catch(e){}});
    Object.keys(CR).forEach(k=>delete CR[k]);
    return;
  }
  if(activeCard)document.getElementById('card-'+activeCard)?.classList.remove('active');
  activeCard=id;card.classList.add('active');
  const d=CARDS.find(x=>x.id===id);
  const daSection=d.showDA&&d.da?`${sl('Daily Alerts')}${da(d.da.ts,d.da.date,d.da.events)}`:'';
  const logSection=d.logH?`${sl('Running Incident Log')}${d.logH()}`:'';
  panel.innerHTML=`
    <div class="panel-hd">
      <div class="panel-title">${d.lbl} — briefing · 18 Mar 2026</div>
      <span class="close-btn" onclick="tog('${id}')">×</span>
    </div>
    ${daSection}
    ${sl('Data & Charts')}
    ${d.buildCharts()}
    ${sl('Key Insights')}
    ${ki(d.ki)}
    ${logSection}
    ${sl('Key Sources')}
    ${sp(d.src)}`;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  d.initCharts();
  if(d.popLog)setTimeout(d.popLog,120);
}
